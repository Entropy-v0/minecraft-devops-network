# Vault 2.0 — internal economy compatible with the Vault API
# Provides balance, player-to-player payments, and config/message reload.
# Commands: /balance, /pay, /vault reload. No external Vault.jar required.
plugin_version: 1.6.3
# languages_supported: ["en", "es", "fr", "de", "nl", "pl", "zh_TW", "ru", "pt", "hi"]
language: en
# Vault 2.0 — internal economy compatible with the Vault API
# Commands: /balance, /vault reload.
# currency: global configuration for how money is displayed when the plugin formats amounts (when it uses economy.format()).
# - You can also use text, for example "coins" or "€".
# - Supports colors using & if you want (example: "&6$").
# - position: suffix
#   - Controls where the symbol is placed relative to the number.
#   - suffix = after the number → 10 $
#   - prefix = before the number → $ 10
# PlaceholderAPI:
# - %vault_balance_formatted% uses this currency format automatically
# - %vault_currency_symbol% returns currency.symbol
currency:
  symbol: $
  position: suffix
  space: true
  format: auto
  abbreviate:
    enabled: false
    decimals: 1
    suffix:
      k: k
      m: m
      b: b
      t: t
storage:
  # MySQL storage (set use_mysql: true to enable)
  use_mysql: false
  mysql:
    host: localhost
    port: 3306
    database: vault
    username: root
    password: ''
    pool_size: 10
# params: "useSSL=false&serverTimezone=UTC"
# pool:
#   max: 10
#   min_idle: 2
#   connection_timeout_ms: 10000
#   idle_timeout_ms: 600000
#   max_lifetime_ms: 1800000

import:
  essentials:
    enabled: false
    replace: false # true = overwrite existing balances; false = only create when missing
# target: file  # Optional: "file" forces saving to balances.yml even if MySQL is enabled

# UUID resolution for offline-mode servers
# true: allow operations with unseen players by generating offline UUIDs
offline-uuid-fallback: true

# Check for updates on startup and notify OPs
update_check: true
update_check_debug: false

# /pay menu configuration
pay_menu:
  # Inventory size (multiple of 9)
  size: 27
  # Show your own head among players in the main menu
  show_self: false

# Delivery of pending charge requests on join
pay_pending:
  # Maximum requests delivered per login (remaining stay queued)
  max_on_join: 5

# Amount limits for pay/charge (≤0 disables)
pay_limits:
  min: 1
  max: 100000

# Loan system configuration
# Used to enable player loans and control limits, installments, and automatic charge checks.
loans:
  # Enables or disables the entire loan system.
  enabled: true
  # Maximum number of active loans a player can have at the same time.
  max_active_per_player: 1
  # Minimum amount a player can request as a loan.
  min_amount: 1
  # Maximum amount a player can request as a loan.
  max_amount: 100000
  # Minimum installment allowed for any loan.
  min_installment: 1
  # Raises the minimum installment based on the total loan amount.
  # Format: loan_amount: minimum_installment
  min_installment_by_amount:
    '1000': 50
    '5000': 250
  # Maximum number of installments allowed when creating a loan.
  max_installments: 60
  # Default time between installments in hours.
  default_interval_hours: 24
  # How often the plugin checks if an installment should be charged.
  charge_check_seconds: 60
  # Maximum failed automatic charges before the loan is marked as defaulted.
  max_missed_payments: 3
  # Effects applied to players whose loan is DEFAULTED (mora). Refreshed periodically so it persists.
  defaulted_effects:
    enabled: true
    refresh_seconds: 5
    duration_seconds: 8
    # Format: EFFECT_NAME:LEVEL (LEVEL is 1-based)
    # Examples: SLOW:2, SLOW_DIGGING:1 (fatigue)
    effects:
    - SLOW:1
    - SLOW_DIGGING:1

# docs (information only; not used by code)
#
# Commands
# - /pay <player> <amount> | /pay | /pay <player>
#   - Send money, charge (request payment), and open the menu/player submenu.
#   - Actions: Pay, Charge (request payment), View target balance
# - /balance
#   - Show your current balance.
# - /vaultop [page]
#   - Show the top players with the most money.
# - /vault | /vault reload | /vault update | /vault loan
#   - Open the Vault menu. Admin actions: reload/update (OP only). Loans: /vault loan.
# - /vault loan
#   - Open the loan menu (request, status, pay).
# - /eco give <player> <amount> | /eco take <player> <amount>
#   - Give or take money from a player (admin only).
#   - permission_required: op
#   - notes: Supports subcommands: give and take. Example: /eco take <player> <amount>
#   - permissions:
#     - vault.eco (default: op) — Allows using /eco including give and take subcommands.
#
# Placeholders
# - %vault_top% — Returns a single-line top list (top 10).
# - %vault_top_1% ... %vault_top_10% — One placeholder per rank (also supports %vault_top_name_1% and %vault_top_amount_1%).
# - %vault_balance% — Raw balance number.
# - %vault_balance_formatted% — Formatted balance using currency.* from this config.
# - %vault_currency_symbol% — Returns currency.symbol from this config.
#
# Guides
# - Pay
#   - Select Pay in /pay (or player submenu) and type an amount.
#   - Online: Money is transferred instantly to the online target.
#   - Offline: Direct pay to offline targets is not available; use Charge.
#   - Chat: Type 'cancel' to abort while entering the amount.
#   - Limits: pay_limits apply; bypass nodes can ignore them.
# - Charge
#   - Select Charge in /pay (or player submenu) and type an amount.
#   - Online: The target receives a clickable message to pay.
#   - Offline: The request is stored and delivered when the player joins.
#   - Chat: Type 'cancel' to abort while entering the amount.
#   - Limits: pay_limits apply; bypass nodes can ignore them in chat flow.
# - Menu
#   - Open /pay to list players. Click a player to open the submenu.
#   - Navigation: Use Previous/Next to move between pages.
#   - Texts: Menu titles and item names are defined in messages/messages_*.yml.
#   - Config keys: pay_menu.size and pay_menu.show_self
# - Eco
#   - Use /eco to give or take money from a player.
#   - Online: Balance is updated instantly for online targets.
#   - Offline: Works for offline players; accounts are created automatically if needed.
#   - Limits: Pay limits do not apply; operator-only administration command.

# permissions:
#   vault.pay      # use /pay and open the payment menu (default: op)
#   vault.eco      # give and take money (default: op)
#   vault.balance  # use /balance (default: op)
#   vault.loan     # use /vault loan and open the loan menu (default: true)



